name: Deploy to GitHub Pages

# Builds the Shiny for Python app into a static Shinylive (WebAssembly) site and
# publishes it to GitHub Pages. No server is needed — the app runs entirely in
# the browser via Pyodide.
#
# One-time setup: Settings → Pages → Build and deployment → Source: GitHub Actions

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

# Permissions needed for the GITHUB_TOKEN to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one deployment at a time; cancel older in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # shinylive export() does NOT need the app's own packages installed — it
      # reads the source, bundles the matching Wasm/pure-Python wheels, and lists
      # any extras (see src/requirements.txt) for runtime micropip install. So the
      # host only needs shinylive itself.
      - name: Install shinylive
        run: pip install shinylive

      # Cache the ~400 MB Shinylive web assets (Pyodide runtime) between runs.
      - name: Cache Shinylive assets
        uses: actions/cache@v4
        with:
          path: ~/.cache/shinylive
          key: shinylive-${{ runner.os }}

      - name: Build static Shinylive site
        run: shinylive export src _site

      # Pages served from an Actions artifact aren't run through Jekyll, but add
      # .nojekyll anyway so Shinylive's underscore-prefixed assets are safe.
      - name: Disable Jekyll
        run: touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
